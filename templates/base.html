<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}homemade-datarobot{% endblock %}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #142033;
      --muted: #5a6880;
      --line: #d9e0ea;
      --blue: #1f5eff;
      --green: #14804a;
      --red: #bf1d2d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    a { color: var(--blue); text-decoration: none; }
    .shell {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .nav {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .nav a, .button, button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
    }
    .button.primary, button.primary {
      background: var(--blue);
      color: white;
      border-color: var(--blue);
    }
    .grid {
      display: grid;
      gap: 16px;
    }
    .grid.cards {
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      min-width: 0;
    }
    .panel h2, .panel h3 {
      margin: 0 0 14px 0;
      font-size: 18px;
    }
    .muted { color: var(--muted); }
    .text-wrap {
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .kv {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 10px 16px;
      align-items: start;
      min-width: 0;
    }
    .kv.compact {
      grid-template-columns: 88px minmax(0, 1fr);
      column-gap: 12px;
    }
    .kv > div {
      min-width: 0;
      overflow-wrap: anywhere;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      background: #edf2ff;
      color: #2441a6;
    }
    .badge.ok { background: #eaf8ef; color: var(--green); }
    .badge.fail { background: #fdecef; color: var(--red); }
    .mini-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .mini-chip {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      max-width: 100%;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 9px;
      background: #f8fafc;
      font-size: 13px;
      overflow-wrap: anywhere;
    }
    .completion-block + .completion-block {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      font-size: 14px;
    }
    label { display: block; font-weight: 600; margin-bottom: 6px; }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
    }
    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      padding: 0;
      margin: 0;
      accent-color: var(--blue);
    }
    .checkbox-field {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      min-height: 48px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .checkbox-field label {
      margin: 0;
    }
    .form-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .form-grid .full { grid-column: 1 / -1; }
    .messages {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }
    .message {
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
    }
    pre.log {
      margin: 0;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fbfcfe;
      color: var(--text);
      font-size: 12px;
      line-height: 1.5;
      overflow: auto;
      min-height: 240px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    @media (max-width: 900px) {
      .form-grid, .kv, .kv.compact {
        grid-template-columns: 1fr;
      }
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div>
        <h1 style="margin:0;font-size:28px;">homemade-datarobot</h1>
        <div class="muted" style="margin-top:6px;">Django 业务壳层 + MLflow 训练内核</div>
      </div>
      <div class="nav">
        {% if request.user.is_authenticated %}
          <span class="muted">当前用户：{{ request.user.username }}</span>
          <a href="{% url 'task-list' %}">任务列表</a>
          <a href="{% url 'task-create' %}">创建任务</a>
          <a href="/api/docs" target="_blank">API 文档</a>
          <a href="{% url 'logout' %}">退出</a>
        {% else %}
          <a href="{% url 'login' %}">登录</a>
          <a href="{% url 'register' %}">注册</a>
        {% endif %}
      </div>
    </div>
    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="message">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
